name: Octane Integration
on:
  pull_request:
    types: [opened, edited, closed, reopened]
  workflow_run:
    workflows: [Java CI]
    types: [completed]
env: 
    NODE_TLS_REJECT_UNAUTHORIZED: 0
jobs:
  octane_integration_job:
    runs-on: ubuntu-latest
    name: OctaneIntegration
    steps:
      - name: GitHub Actions ALM Octane Integration
        
        uses: MicroFocus/alm-octane-github-actions-integration@main
        id: gitHubActionsIntegration
        with:

          octaneUrl: 'https://almoctane-eur.saas.microfocus.com'
          octaneSharedSpace: 646003
          octaneWorkspace: 500
          octaneClientId: ${{secrets.ALM_OCTANE_CLIENT_ID}}
          octaneClientSecret: ${{secrets.ALM_OCTANE_CLIENT_SECRET}}
          githubToken: ${{secrets.GITHUB_TOKEN}}

          serverBaseUrl: https://github.com/medamineguermezi150-cloud/firstProject
        
          pipelineNamePattern: '${workflow_name}'
         
          unitTestResultsGlobPattern: "**/*.xml"
