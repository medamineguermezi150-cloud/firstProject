name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn clean test
      
    - name: Upload Karate Reports
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: karate-reports
        path: target/karate-reports/

    - name: Install JMeter
      run: |
        sudo apt-get update
        sudo apt-get install -y jmeter

    - name: Run Performance Tests
      run: |
          jmeter -n \
          -t PerformanceTest/Test.jmx \
          -l results.jtl \
          -e -o report
    - name: Upload Perforamnce Report
      uses: actions/upload-artifact@v4
      with:
         name: jmeter-report
         path: report

    
