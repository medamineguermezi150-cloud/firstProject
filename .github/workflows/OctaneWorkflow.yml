name: Octane Integration
on:
  pull_request:
    types: [opened, edited, closed, reopened]
  workflow_run:
    workflows: ["Java CI"]
    types: [completed]

jobs:
  octane_integration_job:
    runs-on: ubuntu-latest
    name: OctaneIntegration
    steps:
      - name: Download test results from Java CI
        uses: actions/download-artifact@v4
        with:
          name: karate-reports
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          
      - name: Debug Octane Connection
        run: |
         echo "Testing connection to Octane..."
         curl -I "https://almoctane-eur.saas.microfocus.com/api/shared_spaces/646003/workspaces/1002/ci_servers" \
         -u "${{secrets.ALM_OCTANE_CLIENT_ID}}:${{secrets.ALM_OCTANE_CLIENT_SECRET}}" \
         -H "Accept: application/json"   
      - name: Verify secrets exist
        run: |
          if [ -z "${{ secrets.ALM_OCTANE_CLIENT_ID }}" ]; then echo "Client ID missing"; else echo "Client ID OK"; fi
          if [ -z "${{ secrets.ALM_OCTANE_CLIENT_SECRET }}" ]; then echo "Client Secret missing"; else echo "Client Secret OK"; fi
          
      - name: Check Karate reports
        run: |
          echo "Listing report files"
          find targets -name "*.xml" || true   
   
              
      - name: GitHub Actions ALM Octane Integration
        
        uses: MicroFocus/alm-octane-github-actions-integration@v1.0
        id: gitHubActionsIntegration
        with:

          octaneUrl: 'https://almoctane-eur.saas.microfocus.com'
          octaneSharedSpace: 646003
          octaneWorkspace:   1002
          octaneClientId: ${{secrets.ALM_OCTANE_CLIENT_ID}}
          octaneClientSecret: ${{secrets.ALM_OCTANE_CLIENT_SECRET}}
          githubToken: ${{secrets.GITHUB_TOKEN}}

          serverBaseUrl: "https://github.com/medamineguermezi150-cloud/firstProject"
 
          

         
          unitTestResultsGlobPattern: "**/*.xml"
